name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Windows build ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icons
        run: python build_scripts/make_icon.py

      - name: Build with PyInstaller
        run: pyinstaller main.spec

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build NSIS installer
        run: |
          cd installer
          & "C:\Program Files (x86)\NSIS\makensis.exe" nxlibrarian.nsi
          mv NX-Librarian-Setup.exe ../dist/
        shell: pwsh

      - name: Create source zip
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path . -DestinationPath "dist/NX-Librarian-${tag}-source.zip" `
            -CompressionLevel Optimal `
            -Force
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/NX-Librarian-Setup.exe
            dist/NX-Librarian-*-source.zip

  # ── macOS build ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icons
        run: python build_scripts/make_icon.py

      - name: Build with PyInstaller
        run: pyinstaller main.spec

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          bash build_scripts/create_dmg.sh "$VERSION"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: dist/*.dmg

  # ── Linux build ──────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk python3-dev libfuse2 dpkg fuse

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icons
        run: python build_scripts/make_icon.py

      - name: Build with PyInstaller
        run: pyinstaller main.spec

      - name: Build AppImage
        run: bash build_scripts/create_appimage.sh

      - name: Build .deb
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          bash build_scripts/create_deb.sh "$VERSION"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            dist/*.AppImage
            dist/*.deb

  # ── Create GitHub Release ────────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Determine pre-release flag
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -qiE 'alpha|beta|nightly|rc'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "NX-Librarian ${{ github.ref_name }}"
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
